<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panas 1914: Definitivo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="overlay"></div>

  <header>

    <div>
      <h1>Panas 1914: Definitivo</h1>
      <p id="turnText">Turno 1 • Año 1914</p>
    </div>

    <button id="nextTurn">
      Siguiente Turno
    </button>

  </header>

  <main>

    <aside>

      <h2>Naciones</h2>

      <div id="countryList"></div>

    </aside>

    <section class="panel">

      <h2 id="countryName">
        Alemania
      </h2>

      <div class="resources">

        <div class="card">
          <span>💰 Dinero</span>
          <strong id="money">10</strong>
        </div>

        <div class="card">
          <span>⛽ Petróleo</span>
          <strong id="oil">5</strong>
        </div>

        <div class="card">
          <span>🔩 Acero</span>
          <strong id="steel">8</strong>
        </div>

        <div class="card">
          <span>🍞 Comida</span>
          <strong id="food">12</strong>
        </div>

      </div>

      <div class="buttons">

        <button id="buyInfantry">
          Comprar Infantería
        </button>

        <button id="buyTank">
          Comprar Tanque
        </button>

        <button id="eventButton">
          Evento
        </button>

      </div>

      <div class="news">

        <h3>Noticias Mundiales</h3>

        <div id="newsFeed"></div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
