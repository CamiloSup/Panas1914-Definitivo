<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panas 1914: Definitivo</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="title-section">
    <h1>Panas 1914: Definitivo</h1>
    <p id="turn-info">Turno 1 - Año 1914</p>
  </div>

  <button id="next-turn-btn">
    Siguiente Turno
  </button>
</header>

<main>

  <section class="sidebar">

    <h2>Países</h2>

    <div id="countries-list"></div>

  </section>

  <section class="main-panel">

    <div class="country-card">

      <h2 id="country-name">Alemania</h2>

      <div class="resources-grid">

        <div class="resource">
          <span>💰 Dinero</span>
          <strong id="money">10</strong>
        </div>

        <div class="resource">
          <span>⛽ Petróleo</span>
          <strong id="oil">5</strong>
        </div>

        <div class="resource">
          <span>🔩 Acero</span>
          <strong id="steel">8</strong>
        </div>

        <div class="resource">
          <span>🍞 Comida</span>
          <strong id="food">12</strong>
        </div>

      </div>

      <div class="actions">

        <button id="buy-infantry">
          Comprar Infantería
        </button>

        <button id="buy-tank">
          Comprar Tanque
        </button>

        <button id="draw-event">
          Robar Evento
        </button>

      </div>

    </div>

    <div class="news-panel">

      <h2>Noticias Mundiales</h2>

      <div id="news-feed">
        <p>Europa se encuentra en tensión...</p>
      </div>

    </div>

  </section>

</main>

<script src="data/countries.js"></script>
<script src="data/events.js"></script>

<script src="systems/economy.js"></script>
<script src="systems/military.js"></script>
<script src="systems/events-system.js"></script>
<script src="systems/diplomacy.js"></script>
<script src="systems/turns.js"></script>

<script src="script.js"></script>

</body>
</html>
